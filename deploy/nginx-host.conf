# Host-level nginx for rooomebel.ru.
#
# Lives at /etc/nginx/sites-available/mebel on the server. Owns ports 80/443,
# terminates TLS (certbot), and reverse-proxies to the compose `web` container
# on 127.0.0.1:8080.
#
# Apply on the server with:
#   ln -sf /opt/mebel/deploy/nginx-host.conf /etc/nginx/sites-enabled/mebel
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#
# Then run certbot to add the TLS block:
#   certbot --nginx -d rooomebel.ru -d www.rooomebel.ru \
#     --redirect --agree-tos --no-eff-email -m owner@rooomebel.ru
#
# Certbot will rewrite this file in place to add `listen 443 ssl` and
# the cert paths. Don't edit those certbot-managed lines by hand.

server {
    listen 80;
    listen [::]:80;
    server_name rooomebel.ru www.rooomebel.ru;

    # Same proxy block for everything — react SPA, /api, /ws, /static all
    # served by the compose `web` container which already routes them.
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade for /ws/orders/{id}/chat.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;       # long-lived chat sockets
        client_max_body_size 12m;       # ≥ UPLOAD_MAX_BYTES envelope
    }
}
