### nginx — reverse proxy for the Mebel storefront.
#
# Terminates HTTP from the user, serves the SPA bundle out of /usr/share/nginx/html
# (the React build copied into the image), and forwards /api → fastapi.
#
# In docker-compose this nginx talks to the api container by name (`api`).
# On a bare-metal Ubuntu install the equivalent block in /etc/nginx/sites-
# available/mebel.conf would `proxy_pass http://127.0.0.1:8000;` — see
# deploy/README.md.

upstream mebel_api {
    server api:8000;
}

server {
    listen 80;
    server_name _;

    # ── Static SPA ────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed bundles (Vite outputs `assets/index-<hash>.js`).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else falls back to index.html so react-router handles routing.
    location / {
        try_files $uri /index.html;
    }

    # ── Locally-uploaded admin photos (FastAPI StaticFiles) ───────
    # When S3 isn't configured, storage.upload_image saves files to
    # /app/uploads inside the api container and returns URLs of the form
    # /static/uploads/<prefix>/<uuid>.<ext>. Without this block nginx
    # would fall through to `try_files $uri /index.html` and serve the
    # SPA HTML for image requests, breaking every <img>.
    location /static/uploads/ {
        proxy_pass http://mebel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Browser cache so the gallery doesn't re-fetch unchanged images.
        # Filenames are UUID-derived so a new upload never collides.
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ── Forward to FastAPI ────────────────────────────────────────
    location /api/ {
        # Strip the /api prefix before forwarding (FastAPI mounts at root).
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://mebel_api;
        proxy_http_version 1.1;

        # WebSocket upgrade for /ws/orders/{id}/chat (no /api prefix —
        # see /ws/ block below).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90s;
        client_max_body_size 12m;  # matches UPLOAD_MAX_BYTES default (10 MB) + envelope
    }

    location /ws/ {
        proxy_pass http://mebel_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;  # long-lived chat connections
    }

    # ── Health check (used by docker-compose / load balancers) ────
    location /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
