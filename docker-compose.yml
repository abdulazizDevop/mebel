services:
  db:
    # AWS Public ECR mirror of Docker Hub library/* — no anonymous rate limit.
    image: public.ecr.aws/docker/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mebel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mebel}
    volumes:
      - mebel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mebel} -d ${POSTGRES_DB:-mebel}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL inside the compose network — db is the
      # service name, not localhost.
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mebel}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mebel}
    volumes:
      # Persist locally-stored uploads across container rebuilds. Without
      # this, every `docker compose up --build` wipes admin-uploaded photos.
      # Stays empty when S3 is configured (storage.upload_image takes the S3
      # branch and never touches /app/uploads).
      - mebel_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Frontend talks to nginx itself via /api — same origin, no CORS.
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # Bind only to loopback — the host's nginx in deploy/nginx-host.conf
      # owns port 80/443 and reverse-proxies to us. This frees up 80 for
      # certbot's HTTP-01 challenge during cert issuance / renewal.
      - "127.0.0.1:8080:80"

volumes:
  mebel_pgdata:
  mebel_uploads:
